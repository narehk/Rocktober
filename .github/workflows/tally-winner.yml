name: Tally Winner

on:
  schedule:
    # Default: 4:30 PM ET (20:30 UTC during EDT, 21:30 UTC during EST)
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  tally-winner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tally winner script
        run: node .github/scripts/tally-winner.js
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add competitions/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(round): tally votes and update leaderboard [automated]"
            git push
          fi
