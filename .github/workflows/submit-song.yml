name: Process Song Submission

on:
  repository_dispatch:
    types: [submit-song]

permissions:
  contents: write

concurrency:
  group: round-mutation-${{ github.event.client_payload.competition }}-${{ github.event.client_payload.day }}
  cancel-in-progress: false

jobs:
  process-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process submission
        run: node .github/scripts/process-submission.js '${{ toJSON(github.event.client_payload) }}'

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add competitions/
          if git diff --cached --quiet; then
            echo "No changes to commit (submission may have been rejected)."
          else
            git commit -m "submission: ${{ github.event.client_payload.submitter }} → round ${{ github.event.client_payload.day }} [automated]"
            git push
          fi
