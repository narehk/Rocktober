<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCKTOBER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- CRT Scanline Overlay -->
  <div class="crt-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <h1 class="chrome-text">ROCKTOBER</h1>
    <p class="tagline">Daily Themed Playlist Battles</p>
    <div class="user-select hidden" id="user-select">
      <label class="pixel-text user-select-label">PLAYING AS:</label>
      <select id="current-user" class="user-dropdown"></select>
    </div>
  </header>

  <div class="app-layout">
    <main class="main-content">
      <!-- Round Phase Display -->
      <section class="round-section" id="round-display">
        <div class="loading-state" id="loading">
          <p class="pixel-text blink">LOADING...</p>
        </div>

        <div class="error-state hidden" id="error">
          <h2 class="pixel-text glitch">GAME OVER</h2>
          <p class="error-message" id="error-message">Could not load competition data.</p>
        </div>

        <!-- Theme Display -->
        <div class="theme-display hidden" id="theme-display">
          <div class="round-badge" id="round-badge">ROUND 01</div>
          <h2 class="theme-title neon-text" id="theme-title"></h2>
          <p class="theme-picker" id="theme-picker"></p>
          <div class="phase-badge" id="phase-badge"></div>
        </div>

        <!-- Song Search (submission phase only) -->
        <div class="song-search hidden" id="song-search">
          <h3 class="pixel-text search-heading">SEARCH & SUBMIT</h3>
          <div class="search-bar">
            <input type="text" id="search-input" class="search-input"
                   placeholder="Search for a song..." autocomplete="off">
            <span class="search-icon" aria-hidden="true">&#9835;</span>
          </div>
          <div class="search-status hidden" id="search-status"></div>
          <div class="search-results hidden" id="search-results"></div>
        </div>

        <!-- Submissions Grid -->
        <div class="submissions-grid hidden" id="submissions-grid"></div>

        <!-- Winner Display -->
        <div class="winner-display hidden" id="winner-display">
          <h3 class="pixel-text">WINNER</h3>
          <div class="winner-card" id="winner-card"></div>
        </div>
      </section>
    </main>

    <aside class="sidebar">
      <!-- Leaderboard -->
      <section class="leaderboard-section">
        <h2 class="pixel-text sidebar-title">LEADERBOARD</h2>
        <div class="leaderboard" id="leaderboard">
          <p class="no-data">No standings yet.</p>
        </div>
      </section>

      <!-- Competition Info -->
      <section class="comp-info-section">
        <h2 class="pixel-text sidebar-title">INFO</h2>
        <div class="comp-info" id="comp-info">
          <p class="no-data">Loading...</p>
        </div>
      </section>
    </aside>
  </div>

  <footer class="site-footer">
    <p class="pixel-text footer-text">&copy; 2024 ROCKTOBER &mdash; Git-Powered Playlist Battles</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
