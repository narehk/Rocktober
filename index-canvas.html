<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocktober — Canvas UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d12; }
    #canvas { display: none; position: fixed; top: 0; left: 0; }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #00e5ff;
      text-shadow: 0 0 7px #00e5ff, 0 0 20px #00e5ff;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="loading">LOADING...</div>
  <canvas id="canvas"></canvas>
  <!-- DOM overlays for text inputs (Phase 5) -->
  <div id="canvas-overlays" style="position:fixed;top:0;left:0;pointer-events:none;z-index:10;"></div>
  <script type="module" src="js/canvas/app-canvas.js"></script>
</body>
</html>
